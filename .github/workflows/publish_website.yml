name: Publish Website

on:
  push:
    paths:
      - "momentum/website/**"
      - "momentum/Doxyfile"
      - "pymomentum/**"
      - ".github/workflows/publish_website.yml"
  pull_request:
    paths:
      - "momentum/website/**"
      - "momentum/Doxyfile"
      - "pymomentum/**"
      - ".github/workflows/publish_website.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_docs_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    # 0) Check out the repository
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 2

    # 1) Detect if pymomentum source changed
    - name: Check for pymomentum changes
      id: check_pymomentum
      run: |
        if git diff --name-only HEAD~1 HEAD | grep -q '^pymomentum/'; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    # 2) Build Docusaurus site with C++ docs (using Doxygen)
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
          node-version: 20

    - name: Install Doxygen
      run: sudo apt-get install doxygen

    - name: Build the Website
      working-directory: momentum/website
      run: |
        yarn install --frozen-lockfile
        yarn run build

    # 3) Build Python API docs (only when pymomentum source changed)
    - name: Free up disk space before pixi
      if: steps.check_pymomentum.outputs.changed == 'true'
      run: |
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /opt/ghc || true
        sudo rm -rf /usr/local/share/boost || true
        sudo rm -rf /usr/local/graalvm/ || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /usr/local/.ghcup || true
        sudo rm -rf /opt/hostedtoolcache || true
        sudo apt-get clean || true
        sudo rm -rf /home/runner/.cache/* || true
        df -h

    - name: Set up pixi
      if: steps.check_pymomentum.outputs.changed == 'true'
      uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.5
      with:
        cache: false
        environments: default

    - name: Build Python API Documentation
      if: steps.check_pymomentum.outputs.changed == 'true'
      run: |
        pixi run doc_py

    # 4) Copy Python API Documentation to Docusaurus (if built)
    - name: Copy Python API Documentation
      if: steps.check_pymomentum.outputs.changed == 'true'
      run: |
        cp -R build/python_api_doc momentum/website/build/python_api_doc

    # 4.5) Preserve existing Python API docs from gh-pages (when not rebuilt)
    - name: Preserve existing Python API docs from gh-pages
      if: steps.check_pymomentum.outputs.changed != 'true'
      run: |
        git fetch origin gh-pages --depth=1 || true
        if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
          git checkout origin/gh-pages -- python_api_doc/ 2>/dev/null || true
          if [ -d python_api_doc ]; then
            cp -R python_api_doc momentum/website/build/python_api_doc
          fi
        fi

    # 5) Upload the built website as an artifact
    - name: Upload Built Website
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: built-website
        path: momentum/website/build

    # 6) Deploy Docusaurus folder to GitHub Pages
    - name: Deploy to GiHub Pages
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # releases/v4
      with:
          token: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: momentum/website/build
