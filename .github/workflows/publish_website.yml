name: Publish Website

on:
  push:
    paths:
      - "momentum/website/**"
      - "momentum/Doxyfile"
      - "pymomentum/**"
      - ".github/workflows/publish_website.yml"
  pull_request:
    paths:
      - "momentum/website/**"
      - "momentum/Doxyfile"
      - "pymomentum/**"
      - ".github/workflows/publish_website.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_docs_job:
    runs-on: ubuntu-latest

    steps:
    # 0) Clean up disk
    - name: Maximize build space
      uses: easimon/maximize-build-space@c28619d8999a147d5e09c1199f84ff6af6ad5794 # master
      with:
        root-reserve-mb: 32768
        remove-dotnet: true
        remove-android: true
        remove-haskell: true
        remove-codeql: true
        remove-docker-images: true

    # 1) Check out the repository
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    # 2) Build Docusaurus site with C++ docs (using Doxygen)
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
          node-version: 20
          # Disable yarn cache since we clear ~/.cache later in disk cleanup step
          # cache: yarn
          # cache-dependency-path: ./momentum/website/yarn.lock

    - name: Install Doxygen
      run: sudo apt-get install doxygen

    - name: Build the Website
      working-directory: momentum/website
      run: |
        yarn install --frozen-lockfile
        yarn run build

    - name: Free up disk space before pixi
      run: |
        # Remove unnecessary large packages to free disk space
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /opt/ghc || true
        sudo rm -rf /usr/local/share/boost || true
        sudo rm -rf /usr/local/graalvm/ || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /usr/local/.ghcup || true
        sudo rm -rf /opt/hostedtoolcache || true
        # Clear apt cache
        sudo apt-get clean || true
        # Clear GitHub runner caches and logs
        sudo rm -rf /home/runner/actions-runner/cached/_diag/*.log || true
        sudo rm -rf /home/runner/.cache/* || true
        df -h

    # 3) Build Python API docs
    - name: Set up pixi
      uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.5
      with:
        cache: false
        environments: default

    - name: Build Python API Documentation
      run: |
        MOMENTUM_BUILD_WITH_FBXSDK=ON \
          pixi run doc_py

    # 4) Copy Python API Documentation to Docusaurus
    - name: Copy Python API Documentation
      run: |
        cp -R build/python_api_doc momentum/website/build/python_api_doc

    # 5) Upload the built website as an artifact
    - name: Upload Built Website
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: built-website
        path: momentum/website/build

    # 6) Deploy Docusaurus folder to GitHub Pages
    - name: Deploy to GiHub Pages
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # releases/v4
      with:
          ACCESS_TOKEN: ${{ secrets.BYPASS_TOKEN }}
          BRANCH: gh-pages
          FOLDER: momentum/website/build
