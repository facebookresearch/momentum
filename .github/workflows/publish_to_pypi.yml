name: PyPI Wheels

on:
  # Build wheels on every push to test the build process
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/website/**"
    tags:
      - 'v*'

  # Build on pull requests
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "**/website/**"

  # Allow manual trigger for testing builds or publishing
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to PyPI (otherwise just build and test)'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_cpu_wheels:
    name: pypi-cpu-py${{ matrix.python-version }}-${{ matrix.os-short }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12', '3.13']
        include:
          - os: ubuntu-latest
            os-short: ubuntu

    steps:
      # Skip Python 3.13 builds on regular commits to reduce CI cost
      # Python 3.13 builds will still run when publishing (tags or manual workflow_dispatch with publish=true)
      - name: Check if should run
        id: should_run
        run: |
          if [[ "${{ matrix.python-version }}" == "3.13" ]]; then
            if [[ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]] || \
               [[ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' }}" == "true" ]]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - uses: actions/checkout@v4
        if: steps.should_run.outputs.run == 'true'
        with:
          submodules: recursive

      - name: Set up Python
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Generate pyproject configs
        if: steps.should_run.outputs.run == 'true'
        run: |
          pip install jinja2
          python scripts/generate_pyproject.py

      - name: Build CPU wheels with cibuildwheel
        if: steps.should_run.outputs.run == 'true'
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: cp${{ matrix.python-version == '3.12' && '312' || '313' }}-*
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ARCHS_MACOS: arm64
          CIBW_ENVIRONMENT_LINUX: >
            CMAKE_PREFIX_PATH=/opt/miniforge/envs/build
            PKG_CONFIG_PATH=/opt/miniforge/envs/build/lib/pkgconfig
            CONDA_PREFIX=/opt/miniforge/envs/build
            CC=/opt/miniforge/envs/build/bin/x86_64-conda-linux-gnu-gcc
            CXX=/opt/miniforge/envs/build/bin/x86_64-conda-linux-gnu-g++
            CMAKE=/opt/miniforge/envs/build/bin/cmake
            CMAKE_MAKE_PROGRAM=/opt/miniforge/envs/build/bin/ninja
          CIBW_BEFORE_ALL_LINUX: >
            curl -fsSL https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -o miniforge.sh &&
            bash miniforge.sh -b -p /opt/miniforge &&
            rm miniforge.sh &&
            /opt/miniforge/bin/mamba create -n build -y python=${{ matrix.python-version }} &&
            /opt/miniforge/bin/mamba install -n build -y -c conda-forge libboost-devel ceres-solver cli11 dispenso eigen ezc3d drjit-cpp fmt fx-gltf indicators kokkos librerun-sdk ms-gsl nlohmann_json openfbx openusd re2 spdlog tracy-profiler-client urdfdom zlib pytorch pybind11 scikit-build-core setuptools-scm ninja cmake c-compiler cxx-compiler ccache
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair
              --exclude 'libtorch*.so'
              --exclude 'libc10*.so'
              --exclude 'libmkl*.so'
              -w {dest_dir} {wheel}
          CIBW_BEFORE_BUILD: >
            cp pyproject-pypi-cpu-py${{ matrix.python-version == '3.12' && '312' || '313' }}.toml pyproject.toml
          CIBW_TEST_COMMAND: >
            python -c "import pymomentum; import torch; print('Import successful')"

      - name: Upload wheel artifacts
        if: steps.should_run.outputs.run == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: wheels-cpu-${{ matrix.os }}-py${{ matrix.python-version }}
          path: wheelhouse/*.whl
          retention-days: 7

  build_gpu_wheels:
    name: pypi-gpu-py${{ matrix.python-version }}-${{ matrix.os-short }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12', '3.13']
        include:
          - python-version: '3.12'
            cuda-version: "12.9.0"
          - python-version: '3.13'
            cuda-version: "12.9.0"
          - os: ubuntu-latest
            os-short: ubuntu

    steps:
      # Skip Python 3.13 builds on regular commits to reduce CI cost
      # Python 3.13 builds will still run when publishing (tags or manual workflow_dispatch with publish=true)
      - name: Check if should run
        id: should_run
        run: |
          if [[ "${{ matrix.python-version }}" == "3.13" ]]; then
            if [[ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]] || \
               [[ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' }}" == "true" ]]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Free disk space
        if: steps.should_run.outputs.run == 'true'
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "After cleanup:"
          df -h

      - uses: actions/checkout@v4
        if: steps.should_run.outputs.run == 'true'
        with:
          submodules: recursive

      - name: Set up Python
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Generate pyproject configs
        if: steps.should_run.outputs.run == 'true'
        run: |
          pip install jinja2
          python scripts/generate_pyproject.py

      - name: Build GPU wheels with cibuildwheel
        if: steps.should_run.outputs.run == 'true'
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: cp${{ matrix.python-version == '3.12' && '312' || '313' }}-*
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686 *-macos*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_ARCHS_LINUX: x86_64
          CIBW_ENVIRONMENT_LINUX: >
            CMAKE_PREFIX_PATH=/opt/miniforge/envs/build
            PATH=/usr/local/cuda/bin:$PATH
            PKG_CONFIG_PATH=/opt/miniforge/envs/build/lib/pkgconfig
            LD_LIBRARY_PATH=/usr/local/cuda/lib64:/opt/miniforge/envs/build/lib:$LD_LIBRARY_PATH
            CUDA_HOME=/usr/local/cuda
            TORCH_CUDA_ARCH_LIST=5.0;6.0;6.1;7.0;7.5;8.0;8.6;8.9;9.0+PTX
            CONDA_PREFIX=/opt/miniforge/envs/build
            CC=/opt/miniforge/envs/build/bin/x86_64-conda-linux-gnu-gcc
            CXX=/opt/miniforge/envs/build/bin/x86_64-conda-linux-gnu-g++
            CMAKE=/opt/miniforge/envs/build/bin/cmake
            CMAKE_MAKE_PROGRAM=/opt/miniforge/envs/build/bin/ninja
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y wget &&
            wget https://developer.download.nvidia.com/compute/cuda/12.9.0/local_installers/cuda-repo-rhel8-12-9-local-12.9.0_560.28.03-1.x86_64.rpm &&
            rpm -i cuda-repo-rhel8-12-9-local-12.9.0_560.28.03-1.x86_64.rpm &&
            yum clean all &&
            yum -y install cuda-toolkit-12-9 &&
            curl -fsSL https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -o miniforge.sh &&
            bash miniforge.sh -b -p /opt/miniforge &&
            rm miniforge.sh &&
            /opt/miniforge/bin/mamba create -n build -y python=${{ matrix.python-version }} &&
            /opt/miniforge/bin/mamba install -n build -y -c conda-forge libboost-devel ceres-solver cli11 dispenso eigen ezc3d drjit-cpp fmt fx-gltf indicators kokkos librerun-sdk ms-gsl nlohmann_json openfbx openusd re2 spdlog tracy-profiler-client urdfdom zlib pytorch-gpu pybind11 scikit-build-core setuptools-scm ninja cmake c-compiler cxx-compiler ccache cuda-toolkit cuda-version=12.9
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            auditwheel repair
              --exclude 'libtorch*.so'
              --exclude 'libc10*.so'
              --exclude 'libcu*.so*'
              --exclude 'libnv*.so*'
              --exclude 'libmkl*.so'
              -w {dest_dir} {wheel}
          CIBW_BEFORE_BUILD: >
            cp pyproject-pypi-gpu.toml pyproject.toml
          CIBW_TEST_COMMAND: >
            python -c "import pymomentum; import torch; print('CUDA available:', torch.cuda.is_available()); print('Import successful')"

      - name: Upload wheel artifacts
        if: steps.should_run.outputs.run == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: wheels-gpu-${{ matrix.os }}-py${{ matrix.python-version }}
          path: wheelhouse/*.whl
          retention-days: 7

  test_ubuntu_22_04:
    name: Test wheels on Ubuntu 22.04 (Colab environment)
    needs: [build_cpu_wheels, build_gpu_wheels]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
        variant: ['cpu']

    steps:
      - name: Check if should run
        id: should_run
        run: |
          if [[ "${{ matrix.python-version }}" == "3.13" ]]; then
            if [[ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]] || \
               [[ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' }}" == "true" ]]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Set up Python
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel artifacts (Linux only)
        if: steps.should_run.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-${{ matrix.variant }}-ubuntu-latest-py${{ matrix.python-version }}
          merge-multiple: true

      - name: List downloaded wheels
        if: steps.should_run.outputs.run == 'true'
        run: |
          echo "Downloaded wheels:"
          ls -lh dist/
          echo ""
          echo "Wheel platform tags:"
          python -m pip install --upgrade pip
          for wheel in dist/*.whl; do
            echo "Checking $wheel:"
            unzip -l "$wheel" | grep -E "\.dist-info/WHEEL"
            unzip -p "$wheel" "*dist-info/WHEEL"
            echo ""
          done

      - name: Check glibc version (Ubuntu 22.04 has glibc 2.35, same as Colab)
        if: steps.should_run.outputs.run == 'true'
        run: |
          echo "Current glibc version:"
          ldd --version
          echo ""
          echo "Expected: Ubuntu 22.04 has GLIBC 2.35, wheel should be tagged manylinux_2_28"

      - name: Install wheel
        if: steps.should_run.outputs.run == 'true'
        run: |
          pip install dist/pymomentum_${{ matrix.variant }}-*-manylinux_2_28_x86_64.whl
          pip list

      - name: Test imports
        if: steps.should_run.outputs.run == 'true'
        run: |
          python -c "import pymomentum; print('✅ pymomentum imported successfully')"
          python -c "import torch; print('✅ torch imported successfully')"
          python -c "import pymomentum; import torch; print('✅ All imports successful - Compatible with Ubuntu 22.04 (Colab environment)')"

  publish_cpu:
    name: Publish pymomentum-cpu to PyPI
    needs: [build_cpu_wheels, test_ubuntu_22_04]
    runs-on: ubuntu-latest
    environment:
      name: pypi-cpu
      url: https://pypi.org/p/pymomentum-cpu
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download CPU wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-cpu-*
          merge-multiple: true

      - name: List CPU distributions
        run: ls -lh dist/

      - name: Publish CPU to PyPI
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        uses: pypa/gh-action-pypi-publish@release/v1

  publish_gpu:
    name: Publish pymomentum-gpu to PyPI
    needs: [build_gpu_wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi-gpu
      url: https://pypi.org/p/pymomentum-gpu
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download GPU wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-gpu-*
          merge-multiple: true

      - name: List GPU distributions
        run: ls -lh dist/

      - name: Publish GPU to PyPI
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        uses: pypa/gh-action-pypi-publish@release/v1
