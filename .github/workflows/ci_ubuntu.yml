name: CI Ubuntu

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/website/**"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "**/website/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  momentum:
    name: cpp${{ matrix.simd == 'ON' && '-simd' || '' }}-${{ matrix.mode == '' && 'opt' || 'dev' }}-ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        simd: ["ON"]  # Only test SIMD=ON (production config) to reduce CI cost
        mode: [""]
    env:
      MOMENTUM_ENABLE_SIMD: ${{ matrix.simd }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.5
        with:
          cache: true

      - name: Check code formatting
        run: |
          pixi run lint-check

      - name: Build and test Momentum
        run: |
          MOMENTUM_BUILD_PYMOMENTUM=$MOMENTUM_BUILD_PYMOMENTUM \
            MOMENTUM_ENABLE_SIMD=$MOMENTUM_ENABLE_SIMD \
            pixi run test${{ matrix.mode }}

      - name: Install Momentum and Build hello_world
        run: |
          MOMENTUM_BUILD_PYMOMENTUM=$MOMENTUM_BUILD_PYMOMENTUM \
            MOMENTUM_ENABLE_SIMD=$MOMENTUM_ENABLE_SIMD \
            pixi run install
          pixi run cmake \
            -S momentum/examples/hello_world \
            -B momentum/examples/hello_world/build \
            -DCMAKE_BUILD_TYPE=Release
          pixi run cmake --build momentum/examples/hello_world/build

  pymomentum:
    name: py-py312-ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.5
        with:
          environments: py312
          cache: true

      - name: Build and test PyMomentum
        env:
          MOMENTUM_MODELS_PATH: momentum/
        run: |
          pixi run -e py312 build_py
          # Bypass `pixi run` for pytest: in GHA the `pixi run -- pytest`
          # exit code is silently swallowed (passes locally, fails in CI).
          # shell-hook activates the env, then we capture pytest's exit code
          # explicitly and `exit $status` to guarantee the step fails on errors.
          eval "$(pixi shell-hook -e py312)"
          status=0
          pytest pymomentum/test/ -k 'not TestRendering' || status=$?
          echo "===PYTEST_EXIT_CODE=$status==="
          exit $status

      - name: Build Python API Doc
        run: |
          pixi run -e py312 doc_py

      - name: Upload Python API Doc
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-api-doc
          path: build/python_api_doc
          retention-days: 7
