name: Weekly CI (GPU)

on:
  schedule:
    - cron: '0 5 * * SUN' # Runs at 05:00 UTC every Sunday
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  pymomentum-ubuntu-gpu:
    name: weekly-py-py312-cuda129-ubuntu-gpu
    runs-on: 4-core-ubuntu-gpu-t4
    env:
      FULL_CUDA_VERSION: "12.9.0"
      # Redirect rattler package cache to workspace partition (maximize-build-space
      # only frees /home/runner/work, not /home/runner/.cache where rattler defaults)
      RATTLER_CACHE_DIR: ${{ github.workspace }}/_rattler_cache
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@c28619d8999a147d5e09c1199f84ff6af6ad5794 # master
        with:
          root-reserve-mb: 8192
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - name: Free additional disk space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/local/graalvm || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /opt/hostedtoolcache || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/share/miniconda || true
          sudo rm -rf /usr/share/az_* || true
          sudo rm -rf /usr/share/kotlinc || true
          sudo rm -rf /opt/microsoft || true
          sudo rm -rf /opt/pipx || true
          sudo rm -rf /imagegeneration || true
          sudo apt-get clean || true
          sudo rm -rf /home/runner/.cache/* || true
          df -h

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup CUDA
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: "12.9.0"

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.5
        with:
          # run-install: false + no environments — we install manually below with retry.
          # cache: false avoids filling /home/runner/.cache/rattler with large CUDA packages.
          cache: false
          run-install: false

      - name: Install pixi environment (with retry)
        # GPU runner conda-forge CDN is unreliable; retry up to 3 times
        run: |
          for i in 1 2 3; do
            pixi install -e py312-cuda129 --locked && break
            echo "pixi install attempt $i/3 failed, retrying in 30s..."
            sleep 30
          done

      - name: Build and test PyMomentum (GPU)
        # With standalone mdspan (no Kokkos runtime), nvcc_wrapper is no longer
        # used, so Ninja works without module scanning issues.
        env:
          MOMENTUM_MODELS_PATH: momentum/
        run: |
          pixi run -e py312-cuda129 build_py
          # Bypass `pixi run` for pytest: in GHA the `pixi run -- pytest`
          # exit code is silently swallowed (passes locally, fails in CI).
          # shell-hook activates the env so pytest's exit code reaches bash -e.
          eval "$(pixi shell-hook -e py312-cuda129)"
          pytest pymomentum/test/ -k 'not TestRendering'

  pymomentum-windows-gpu:
    # Disabled: 4-core-windows-gpu-t4 runner has Visual Studio 2019 but conda
    # py312-cuda129 environment requires VS 2022 (PyTorch headers use AVX-512
    # flags unsupported by MSVC 14.29, and rerun SDK uses C++ features not
    # available in VS 2019). Re-enable when a GPU runner with VS 2022 is available.
    if: false
    name: weekly-py-py312-cuda129-win-gpu
    runs-on: 4-core-windows-gpu-t4
    env:
      FULL_CUDA_VERSION: "12.9.0"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup CUDA
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: "12.9.0"

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@a0af7a228712d6121d37aba47adf55c1332c9c2e # v0.9.5
        with:
          environments: py312-cuda129
          cache: true

      - name: Build PyMomentum (GPU)
        # GPU runner has no Visual Studio. Set CMAKE_ARGS (space-separated,
        # documented by scikit-build-core) via Python os.environ AFTER pixi
        # activation to bypass conda env overrides.
        run: |
          pixi run -e py312-cuda129 python -c "
          import os, subprocess, sys
          os.environ['CMAKE_ARGS'] = '-G Ninja -DMOMENTUM_ENABLE_FBX_SAVING=OFF -DMOMENTUM_ENABLE_SIMD=ON -DMOMENTUM_USE_SYSTEM_GOOGLETEST=ON -DMOMENTUM_USE_SYSTEM_PYBIND11=OFF -DMOMENTUM_USE_SYSTEM_RERUN_CPP_SDK=ON -DBUILD_SHARED_LIBS=OFF'
          sys.exit(subprocess.call(['pip', 'install', '.', '-v']))
          "

      - name: Test PyMomentum (GPU)
        run: |
          pixi run -e py312-cuda129 python -c "
          import os, subprocess, sys
          os.environ['MOMENTUM_MODELS_PATH'] = 'momentum/'
          sys.exit(subprocess.call(['pytest', 'pymomentum/test/', '-k', 'not ((TestFBXIO and (test_save_motions_with_joint_params or test_save_motions_with_model_params)) or test_lighting)']))
          "
